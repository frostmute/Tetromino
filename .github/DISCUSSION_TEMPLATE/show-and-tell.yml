name: 🙌 Show and Tell
description: Share how you're using Tetromino, your vault setup, templates, or workflows
labels: ["show-and-tell", "community"]
body:
  - type: markdown
    attributes:
      value: |
        Want to show off how you're using Tetromino? Share your vault setup, custom templates, channel organization, or creative workflows. This is a great way to inspire other users!

  - type: textarea
    id: setup
    attributes:
      label: Your setup
      description: "Describe your Obsidian vault structure, how you organize channels, or any Tetromino-specific configuration."
      placeholder: "I use Tetromino to..."
    validations:
      required: true

  - type: textarea
    id: template
    attributes:
      label: Custom template (if any)
      description: "Share your custom template or formatting tricks. Use a code block."
      render: markdown
    validations:
      required: false

  - type: textarea
    id: tips
    attributes:
      label: Tips or lessons learned
      description: "What would you tell someone just getting started?"
    validations:
      required: false
