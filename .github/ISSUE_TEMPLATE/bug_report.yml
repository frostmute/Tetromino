name: 🐛 Bug Report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      description: "Find this in Settings → Community plugins → Are.na Sync"
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian version
      description: "Find this in Settings → About"
      placeholder: "e.g. 1.5.8"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Windows
        - Linux
        - iOS
        - Android
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I sync my channel, the plugin..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      value: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console logs
      description: "Open the developer console (Ctrl/Cmd+Shift+I) and paste any errors. Enable **Settings → Are.na Sync → Debug logging** for verbose output."
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, screen recordings, or anything else that helps.
